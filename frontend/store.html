<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | Topin</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0FA986">
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=3.2">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        .store-banner-container {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #1b262c, #0f4c75);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .store-banner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(20,20,20,0.85));
        }
        .store-header-content {
            max-width: 900px;
            margin: -80px auto 0 auto;
            position: relative;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
        }
        .store-identity {
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }
        .store-logo-box {
            width: 130px;
            height: 130px;
            background: var(--surface);
            border-radius: 20px;
            border: 4px solid var(--bg);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .store-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .store-title-block {
            margin-bottom: 10px;
        }
        .store-name {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 6px 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
        }
        .store-tagline {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }
        .store-title-block .rating-stars-container {
            margin: 4px 0 8px 0;
        }
        .store-title-block .rating-stars-container .rating-value {
            color: #ffffff !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }
        .store-title-block .rating-stars-container .rating-count {
            color: rgba(255, 255, 255, 0.75) !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }
        .store-details-grid {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        .store-info-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .store-hours-col {
            border-left: 1px solid var(--border);
            padding-left: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .store-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text2);
        }
        .store-info-row svg, .store-info-row img {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .store-info-row a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .store-info-row a:hover {
            text-decoration: underline;
        }
        .tab-nav-container {
            max-width: 900px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 16px;
            font-weight: 600;
            padding: 12px 20px;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }
        .tab-btn.active {
            color: var(--accent);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--accent);
            border-radius: 3px 3px 0 0;
        }
        .tab-content {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }
        /* Product catalog inside storefront */
        .filter-sidebar-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
        }
        .filter-panel {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .filter-label {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
        }
        .filter-control {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .filter-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text2);
            cursor: pointer;
        }
        .filter-checkbox-label input {
            cursor: pointer;
        }
        .product-grid-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .catalog-count {
            font-size: 16px;
            font-weight: 600;
        }
        .catalog-sort {
            width: 180px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .product-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
            text-decoration: none;
            color: var(--text);
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }
        .product-card-img-box {
            width: 100%;
            height: 200px;
            background: var(--surface2);
            position: relative;
            overflow: hidden;
        }
        .product-card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .ar-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(15, 169, 134, 0.9);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .product-card-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .product-card-title {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-card-desc {
            font-size: 13px;
            color: var(--text3);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        .product-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .product-card-price {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
        }
        .product-card-sale-price {
            font-weight: 700;
            font-size: 15px;
            color: var(--red);
        }
        .original-price-strike {
            font-size: 12px;
            color: var(--text3);
            text-decoration: line-through;
            margin-left: 6px;
        }
        .stock-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .stock-in { background: rgba(15, 169, 134, 0.15); color: var(--accent); }
        .stock-out { background: rgba(255, 84, 62, 0.15); color: var(--red); }
        .stock-preorder { background: rgba(255, 193, 7, 0.15); color: #ffc107; }

        @media (max-width: 768px) {
            .store-banner-container {
                height: 180px;
            }
            .store-identity {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .store-name {
                color: var(--text);
                text-shadow: none;
            }
            .store-tagline {
                color: var(--text2);
                text-shadow: none;
            }
            .store-title-block .rating-stars-container .rating-value {
                color: var(--text) !important;
                text-shadow: none;
            }
            .store-title-block .rating-stars-container .rating-count {
                color: var(--text3) !important;
                text-shadow: none;
            }
            .store-logo-box {
                width: 100px;
                height: 100px;
                border-radius: 16px;
            }
            .store-details-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .store-hours-col {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid var(--border);
                padding-top: 16px;
            }
            .filter-sidebar-layout {
                grid-template-columns: 1fr;
            }
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('houz_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner" style="padding: 0 16px;">
            <div style="display:flex;align-items:center;gap:10px;">
                <a href="/" class="back-btn" aria-label="Go back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <a href="/" class="home-logo">
                    <span class="logo-text-top">TOP</span><span class="logo-text-in">IN</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="store-banner-container" id="storeBanner">
        <div class="store-banner-overlay"></div>
    </div>

    <!-- Store Profile Identity Info -->
    <div class="store-header-content">
        <div class="store-identity">
            <div class="store-logo-box" id="storeLogo">🏪</div>
            <div class="store-title-block">
                <h1 class="store-name" id="storeName">–</h1>
                <div id="storeRatingContainer" style="margin-bottom: 8px;"></div>
                <p class="store-tagline" id="storeTagline">–</p>
            </div>
        </div>

        <div class="store-details-grid">
            <div class="store-info-col">
                <div id="storeContacts" style="display: flex; flex-direction: column; gap: 16px;">
                    <!-- Filled dynamically -->
                </div>
                <!-- Little Map container -->
                <div id="storeMapContainer" style="width: 100%; height: 160px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); display: none; margin-top: 16px;">
                    <iframe id="storeMapIframe" src="" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
            <div class="store-hours-col" id="storeHours">
                <h3 style="margin: 0 0 10px 0; font-size:15px;" id="hoursTitle">Рабочие часы</h3>
                <!-- Filled dynamically -->
            </div>
        </div>
    </div>

    <!-- Navigation tabs -->
    <div class="tab-nav-container">
        <button class="tab-btn active" id="tabProducts" onclick="switchTab('products')">Товары</button>
        <button class="tab-btn" id="tabAbout" onclick="switchTab('about')">О компании</button>
        <button class="tab-btn" id="tabReviews" onclick="switchTab('reviews')">Отзывы</button>
    </div>

    <!-- Main Content Area -->
    <div class="tab-content">
        <!-- Tab 1: Products Listing with Sidebar Filters -->
        <div id="productsView" class="filter-sidebar-layout">
            <div class="filter-panel">
                <div class="filter-section">
                    <label class="filter-label" id="lblSearch">Поиск по магазину</label>
                    <input type="text" id="prodSearch" class="filter-control" placeholder="Поиск товара...">
                </div>

                <div class="filter-section">
                    <label class="filter-label" id="lblCategory">Категория</label>
                    <select id="prodCategory" class="filter-control">
                        <option value="all">Все</option>
                    </select>
                </div>

                <div class="filter-section">
                    <label class="filter-label" id="lblStock">Наличие</label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" id="chkInStock"> <span id="lblInStockOnly">Только в наличии</span>
                    </label>
                </div>

                <div class="filter-section">
                    <label class="filter-label">AR / 3D</label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" id="chkAR"> <span id="lblAROnly">Только с 3D моделью</span>
                    </label>
                </div>
            </div>

            <div class="product-grid-container">
                <div class="catalog-header">
                    <div class="catalog-count" id="productCount">0 товаров</div>
                    <select id="catalogSort" class="filter-control catalog-sort">
                        <option value="newest">Новинки</option>
                        <option value="price-asc">Цена: дешевые</option>
                        <option value="price-desc">Цена: дорогие</option>
                        <option value="rating-desc">По рейтингу</option>
                    </select>
                </div>

                <div class="product-grid" id="productGrid">
                    <!-- Skeletons loaded initially -->
                </div>
            </div>
        </div>

        <!-- Tab 2: About View -->
        <div id="aboutView" style="display: none; background:var(--surface); padding:30px; border-radius:20px; border:1px solid var(--border);">
            <h2 id="aboutTitle" style="margin-top:0;">О компании</h2>
            <div id="aboutContent" style="line-height:1.6; color:var(--text2);">
                <!-- Dynamic rich text description -->
            </div>
        </div>

        <!-- Tab 3: Reviews View -->
        <div id="reviewsView" style="display: none; background:var(--surface); padding:30px; border-radius:20px; border:1px solid var(--border);">
            <div class="reviews-section" style="margin-top:0; border-top:none; padding-top:0;">
                <h3 class="reviews-title" id="lblReviewsTitle">Отзывы и оценки</h3>
                <div class="reviews-list" id="reviewsList">
                    <!-- Loaded dynamically -->
                </div>

                <!-- Write a review form -->
                <div class="review-form-container">
                    <div class="review-form-header" id="btnToggleReviewForm" onclick="toggleReviewForm()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                        <h4 class="review-form-title" id="lblWriteReview" style="margin: 0;">Оставить отзыв</h4>
                        <span class="toggle-icon" id="reviewToggleIcon" style="font-size: 18px; transition: transform 0.2s; color: var(--accent);">➕</span>
                    </div>
                    <form class="review-form" id="reviewForm" onsubmit="submitReview(event)" style="display: none; margin-top: 16px;">
                        <div class="form-group">
                            <label for="reviewAuthor" id="lblYourName">Ваше имя</label>
                            <input type="text" id="reviewAuthor" class="form-input" placeholder="Введите имя..." required>
                        </div>
                        <div class="form-group">
                            <label id="lblYourRating">Ваша оценка</label>
                            <div class="star-rating-selector" id="starSelector">
                                <span data-val="1">☆</span>
                                <span data-val="2">☆</span>
                                <span data-val="3">☆</span>
                                <span data-val="4">☆</span>
                                <span data-val="5">☆</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reviewComment" id="lblYourComment">Комментарий</label>
                            <textarea id="reviewComment" class="form-textarea" placeholder="Напишите ваш отзыв..." required></textarea>
                        </div>
                        <button type="submit" class="btn-submit-review" id="btnSubmitReview">Отправить отзыв</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI element -->
    <div class="toast" id="toast"></div>

    <script src="../js/config.js?v=3.2"></script>
    <script src="../js/utils.js?v=3.2"></script>
    <script>
        let shop = null;
        let currentTab = 'products';
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        const storeSlug = pathSegments[pathSegments.indexOf('stores') + 1];
                function renderStorefrontDetails() {
            if (!shop) return;
            // Sync Header UI elements
            document.title = `${shop.name} | Topin`;
            document.getElementById('storeName').textContent = shop.name;
            document.getElementById('storeRatingContainer').innerHTML = renderRatingStarsHtml(shop.rating, shop.reviewsCount);
            document.getElementById('storeTagline').textContent = getLocalizedText(shop, 'description_ru', 'description').substring(0, 250);
            
            if (shop.bannerUrl) {
                document.getElementById('storeBanner').style.backgroundImage = `url('${shop.bannerUrl}')`;
            }
            if (shop.logoUrl) {
                document.getElementById('storeLogo').innerHTML = `<img src="${cloudinaryOptimize(shop.logoUrl)}" alt="${escHtml(shop.name)}">`;
            }

            // Build Contacts & Social Links
            const contactsEl = document.getElementById('storeContacts');
            let contactHtml = '';
            if (shop.location) {
                contactHtml += `<div class="store-info-row">
                    <img src="../img/icons/Location icon.svg" alt="Адрес">
                    <a href="${shop.locationLink || `https://maps.google.com/?q=${encodeURIComponent(shop.location)}`}" target="_blank" rel="noopener noreferrer">${escHtml(shop.location)}</a>
                </div>`;
            }
            if (shop.phone) {
                contactHtml += `<div class="store-info-row">
                    <img src="../img/icons/phone%20icon.svg" alt="Телефон">
                    <a href="tel:${escHtml(shop.phone)}">${escHtml(shop.phone)}</a>
                </div>`;
            }
            if (shop.telegram) {
                const handle = shop.telegram.split('/').pop();
                contactHtml += `<div class="store-info-row">
                    <img src="../img/icons/Telegram%20.svg" alt="TG">
                    <a href="${escHtml(shop.telegram)}" target="_blank" rel="noopener noreferrer">@${escHtml(handle)}</a>
                </div>`;
            }
            if (shop.instagram) {
                const handle = shop.instagram.split('/').pop().replace('?','');
                contactHtml += `<div class="store-info-row">
                    <img src="../img/icons/instgram%20.svg" alt="IG">
                    <a href="${escHtml(shop.instagram)}" target="_blank" rel="noopener noreferrer">@${escHtml(handle)}</a>
                </div>`;
            }
            if (shop.website) {
                const host = new URL(shop.website).hostname.replace('www.','');
                contactHtml += `<div class="store-info-row">
                    <img src="../img/icons/WebsitegoArrow%20Icon.svg" alt="Web">
                    <a href="${escHtml(shop.website)}" target="_blank" rel="noopener noreferrer">${escHtml(host)}</a>
                </div>`;
            }
            contactsEl.innerHTML = contactHtml;

            // Load Dynamic Map
            const mapContainer = document.getElementById('storeMapContainer');
            const mapIframe = document.getElementById('storeMapIframe');
            if (mapContainer && mapIframe) {
                if (shop.location) {
                    mapIframe.src = `https://maps.google.com/maps?q=${encodeURIComponent(shop.location)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
                    mapContainer.style.display = 'block';
                } else {
                    mapIframe.src = '';
                    mapContainer.style.display = 'none';
                }
            }

            // Load Working Hours
            const hoursEl = document.getElementById('storeHours');
            if (shop.workingHours) {
                try {
                    const hours = JSON.parse(shop.workingHours);
                    let hHtml = `<h3 style="margin: 0 0 10px 0; font-size:15px;" id="hoursTitle">${t('workingHoursTitle')}</h3>`;
                    const days = t('daysAbbrev');
                    
                    const weekKeys = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
                    weekKeys.forEach((dayKey, idx) => {
                        const status = hours[dayKey]?.isActive ? `${hours[dayKey].from} - ${hours[dayKey].to}` : t('closedDay');
                        hHtml += `<div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text3); margin-bottom:4px;">
                            <span>${days[idx]}</span>
                            <span>${status}</span>
                        </div>`;
                    });
                    hoursEl.innerHTML = hHtml;
                } catch(e) { hoursEl.style.display = 'none'; }
            } else {
                hoursEl.style.display = 'none';
            }

            // Tab About updates
            if (currentTab === 'about') {
                const content = getLocalizedText(shop, 'description_ru', 'description');
                document.getElementById('aboutContent').innerHTML = content.replace(/\n/g, '<br>');
            }
        }

        async function initStorefront() {
            // Load Store profile
            try {
                const res = await fetch(`/api/shops/by-slug/${encodeURIComponent(storeSlug)}`);
                if (!res.ok) throw new Error('Shop not found');
                const json = await res.json();
                shop = json.data;
            } catch (err) {
                document.body.innerHTML = `<div style="text-align:center; padding:100px 20px;">
                    <h2>${t('pageNotFound')}</h2>
                    <p>Проверьте корректность ссылки или вернитесь на <a href="/" style="color:var(--accent)">главную</a>.</p>
                </div>`;
                return;
            }

            renderStorefrontDetails();
            setupStarSelector();

            // Load Store-specific Custom Categories & Products
            await Promise.all([
                loadStoreSubCategories(),
                fetchStoreProducts()
            ]);

            // Bind Event Listeners for Filters
            document.getElementById('prodSearch').addEventListener('input', debounce(fetchStoreProducts, 300));
            document.getElementById('prodCategory').addEventListener('change', fetchStoreProducts);
            document.getElementById('chkInStock').addEventListener('change', fetchStoreProducts);
            document.getElementById('chkAR').addEventListener('change', fetchStoreProducts);
            document.getElementById('catalogSort').addEventListener('change', fetchStoreProducts);

            // Send tracking page_view event
            fetch('/api/analytics/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    eventType: 'page_view',
                    deviceType: window.innerWidth < 768 ? (window.innerWidth < 480 ? 'mobile' : 'tablet') : 'desktop',
                    referrer: document.referrer || 'direct',
                    shopId: shop.id
                })
            }).catch(e => {});
        }

        async function loadStoreSubCategories() {
            const select = document.getElementById('prodCategory');
            const currentValue = select.value;
            select.innerHTML = `<option value="all">${t('hammasi')}</option>`;
            try {
                // Fetch subcategories for the main Category this shop belongs to
                const res = await fetch(`/api/subcategories?category=${shop.CategoryId}`);
                const json = await res.json();
                shopCategories = json.data || [];
                
                shopCategories.forEach(sc => {
                    const option = document.createElement('option');
                    option.value = sc.id;
                    option.textContent = currentLang === 'ru' ? sc.name_ru || sc.name : sc.name || sc.name_ru;
                    select.appendChild(option);
                });
                select.value = currentValue;
            } catch(e) {}
        }

        async function fetchStoreProducts() {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('prodSearch').value;
            const subcat = document.getElementById('prodCategory').value;
            const inStock = document.getElementById('chkInStock').checked;
            const hasAr = document.getElementById('chkAR').checked;
            const sort = document.getElementById('catalogSort').value;

            // Display skeletons
            grid.innerHTML = Array(6).fill().map(() => `
                <div class="skeleton-card" style="height: 320px;">
                    <div class="skeleton-logo" style="width:100%; height:180px; border-radius:0;"></div>
                    <div class="skeleton-info">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
            `).join('');

            try {
                const params = new URLSearchParams();
                if (subcat && subcat !== 'all') params.append('subcategory', subcat);
                if (search) params.append('search', search);
                if (inStock) params.append('inStock', 'true');
                if (hasAr) params.append('hasAr', 'true');
                params.append('limit', '100'); // fetch all store products for simplicity

                const res = await fetch(`/api/shops/${shop.id}/products?${params.toString()}`);
                const json = await res.json();
                let products = json.data || [];

                // Sort client side based on selection
                if (sort === 'price-asc') {
                    products.sort((a,b) => parseFloat(a.price || 0) - parseFloat(b.price || 0));
                } else if (sort === 'price-desc') {
                    products.sort((a,b) => parseFloat(b.price || 0) - parseFloat(a.price || 0));
                } else if (sort === 'rating-desc') {
                    products.sort((a,b) => parseFloat(b.rating || 0) - parseFloat(a.rating || 0));
                }

                document.getElementById('productCount').textContent = t('productsCountText').replace('{count}', products.length);

                if (products.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text3);">
                        <p>${t('notFound')}</p>
                    </div>`;
                    return;
                }

                grid.innerHTML = products.map(prod => {
                    const hasModel = prod.glbUrl || prod.usdzUrl;
                    const arBadgeHtml = hasModel ? `<div class="ar-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        3D / AR
                    </div>` : '';

                    const stockText = prod.stockStatus === 'In Stock' ? t('inStockStatus')
                                    : prod.stockStatus === 'Out of Stock' ? t('outOfStockStatus')
                                    : t('preorderStatus');
                    const stockClass = prod.stockStatus === 'In Stock' ? 'stock-in'
                                     : prod.stockStatus === 'Out of Stock' ? 'stock-out'
                                     : 'stock-preorder';

                    const priceStr = prod.price 
                        ? `${parseFloat(prod.price).toLocaleString()} ${shop.currency || 'UZS'}`
                        : t('priceOnRequest');

                    return `
                        <a href="/stores/${shop.slug}/products/${prod.slug}" class="product-card">
                            <div class="product-card-img-box">
                                <img src="${prod.imageUrl || '../img/placeholder.png'}" alt="${escHtml(prod.name)}" loading="lazy">
                                ${arBadgeHtml}
                            </div>
                            <div class="product-card-info">
                                <h3 class="product-card-title">${escHtml(prod.name)}</h3>
                                ${renderRatingStarsHtml(prod.rating, prod.reviewsCount)}
                                <p class="product-card-desc">${escHtml(prod.shortDescription || '')}</p>
                                <div class="product-card-footer">
                                    <span class="product-card-price">${priceStr}</span>
                                    <span class="stock-badge ${stockClass}">${stockText}</span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (err) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--red);">
                    <p>${t('uploadError')}</p>
                </div>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabProducts').classList.toggle('active', tab === 'products');
            document.getElementById('tabAbout').classList.toggle('active', tab === 'about');
            document.getElementById('tabReviews').classList.toggle('active', tab === 'reviews');

            document.getElementById('productsView').style.display = tab === 'products' ? 'grid' : 'none';
            document.getElementById('aboutView').style.display = tab === 'about' ? 'block' : 'none';
            document.getElementById('reviewsView').style.display = tab === 'reviews' ? 'block' : 'none';

            if (tab === 'about') {
                const content = getLocalizedText(shop, 'description_ru', 'description');
                document.getElementById('aboutContent').innerHTML = content.replace(/\n/g, '<br>');
            } else if (tab === 'reviews') {
                loadReviews();
            }
        }

        let selectedRating = 5;

        function setupStarSelector() {
            const stars = document.querySelectorAll('#starSelector span');
            if (stars.length === 0) return;

            function updateStarsVisuals(rating) {
                stars.forEach(s => {
                    const val = parseInt(s.dataset.val);
                    if (val <= rating) {
                        s.textContent = '★';
                        s.classList.add('selected');
                    } else {
                        s.textContent = '☆';
                        s.classList.remove('selected');
                    }
                });
            }

            // Default
            updateStarsVisuals(selectedRating);

            stars.forEach(star => {
                star.addEventListener('mouseover', () => {
                    const hoverVal = parseInt(star.dataset.val);
                    stars.forEach(s => {
                        const val = parseInt(s.dataset.val);
                        s.classList.toggle('hovered', val <= hoverVal);
                    });
                });

                star.addEventListener('mouseout', () => {
                    stars.forEach(s => s.classList.remove('hovered'));
                });

                star.addEventListener('click', () => {
                    selectedRating = parseInt(star.dataset.val);
                    updateStarsVisuals(selectedRating);
                });
            });
        }

        async function loadReviews() {
            const listEl = document.getElementById('reviewsList');
            if (!listEl || !shop) return;

            listEl.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text3);">${currentLang === 'ru' ? '⏳ Загрузка отзывов...' : '⏳ Fikrlar yuklanmoqda...'}</div>`;

            try {
                const res = await fetch(`/api/shops/${shop.id}/reviews`);
                if (!res.ok) throw new Error();
                const json = await res.json();
                const reviews = json.data || [];

                if (reviews.length === 0) {
                    listEl.innerHTML = `<div class="empty-reviews">${t('noReviewsYet')}</div>`;
                    return;
                }

                listEl.innerHTML = reviews.map(r => {
                    const dateStr = new Date(r.createdAt).toLocaleDateString(currentLang === 'ru' ? 'ru-RU' : 'uz-UZ', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    let starsHtml = '';
                    for (let i = 1; i <= 5; i++) {
                        starsHtml += i <= r.rating ? '★' : '☆';
                    }

                    return `
                        <div class="review-item">
                            <div class="review-header">
                                <span class="review-author">${escHtml(r.authorName)}</span>
                                <span class="review-date">${dateStr}</span>
                            </div>
                            <div class="review-stars">${starsHtml}</div>
                            <p class="review-comment">${escHtml(r.comment)}</p>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                listEl.innerHTML = `<div style="color:var(--red); text-align:center;">${currentLang === 'ru' ? 'Ошибка загрузки отзывов.' : 'Fikrlar yuklashda xatolik.'}</div>`;
            }
        }

        async function submitReview(event) {
            event.preventDefault();
            if (!shop) return;

            const authorInput = document.getElementById('reviewAuthor');
            const commentInput = document.getElementById('reviewComment');
            const btnSubmit = document.getElementById('btnSubmitReview');

            if (!commentInput.value.trim()) return;

            btnSubmit.disabled = true;
            btnSubmit.textContent = '...';

            try {
                const res = await fetch(`/api/shops/${shop.id}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        authorName: authorInput.value.trim() || 'Гость',
                        comment: commentInput.value.trim(),
                        rating: selectedRating
                    })
                });

                if (!res.ok) throw new Error();
                
                // Clear form
                authorInput.value = '';
                commentInput.value = '';
                selectedRating = 5;
                const starSelector = document.getElementById('starSelector');
                if (starSelector) {
                    const stars = starSelector.querySelectorAll('span');
                    stars.forEach(s => {
                        s.textContent = parseInt(s.dataset.val) <= 5 ? '★' : '☆';
                        s.classList.add('selected');
                    });
                }

                showToast(t('reviewSuccess'), 'success');

                // Collapse the form on success
                const form = document.getElementById('reviewForm');
                const icon = document.getElementById('reviewToggleIcon');
                if (form) form.style.display = 'none';
                if (icon) icon.textContent = '➕';

                // Reload shop info (to update average rating) & reviews list
                const shopRes = await fetch(`/api/shops/by-slug/${encodeURIComponent(storeSlug)}`);
                if (shopRes.ok) {
                    shop = (await shopRes.json()).data;
                    renderStorefrontDetails();
                }
                
                await loadReviews();
            } catch (err) {
                showToast('Ошибка при отправке отзыва', 'error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = t('submitReviewBtn');
            }
        }

        function toggleReviewForm() {
            const form = document.getElementById('reviewForm');
            const icon = document.getElementById('reviewToggleIcon');
            if (form.style.display === 'none') {
                form.style.display = 'flex';
                icon.textContent = '➖';
            } else {
                form.style.display = 'none';
                icon.textContent = '➕';
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        document.addEventListener('DOMContentLoaded', initStorefront);

        window.addEventListener('langchange', () => {
            renderStorefrontDetails();
            loadStoreSubCategories();
            fetchStoreProducts();
        });
    </script>
